name: Pull Request

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
    types:
      - ready_for_review
      - opened
      - synchronize

jobs:
  build:
    if: ${{ ! github.event.pull_request.draft }}
    uses: ./.github/workflows/docker-build.yml
    permissions:
      contents: "read"
      id-token: "write"
      pull-requests: "read"
